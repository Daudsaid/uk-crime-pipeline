version: 2

models:
  - name: mart_crimes_by_category
    description: "Total crimes per category with outcome resolution rate"
    columns:
      - name: crime_category
        tests:
          - unique
          - not_null
      - name: total_crimes
        tests:
          - not_null
      - name: outcome_rate_pct
        tests:
          - not_null

  - name: mart_monthly_trends
    description: "Monthly crime volume with month-over-month change"
    columns:
      - name: crime_month
        tests:
          - unique
          - not_null
      - name: total_crimes
        tests:
          - not_null

  - name: mart_crimes_by_street
    description: "Crime hotspots ranked by street with most common category"
    columns:
      - name: street_id
        tests:
          - unique
          - not_null
      - name: street_name
        tests:
          - not_null
      - name: total_crimes
        tests:
          - not_null
